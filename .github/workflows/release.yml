name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "github.ref_name is empty."
          }
          $version = $tag.TrimStart('v')
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "win_zip_name=TencentCloudDdnsCSharp-$tag-win-x64.zip" >> $env:GITHUB_OUTPUT
          "linux_zip_name=TencentCloudDdnsCSharp-$tag-linux-arm64.zip" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore TencentCloudDdnsCSharp.sln

      - name: Build
        run: dotnet build TencentCloudDdnsCSharp.sln --configuration Release --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test TencentCloudDdnsCSharp.sln --configuration Release --no-build

      - name: Publish Windows package
        run: >
          dotnet publish TencentCloudDdnsCSharp/TencentCloudDdnsCSharp.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          /p:Version=${{ steps.version.outputs.version }}
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true
          /p:PublishTrimmed=false
          --output publish/win-x64

      - name: Publish Linux ARM64 package
        run: >
          dotnet publish TencentCloudDdnsCSharp/TencentCloudDdnsCSharp.csproj
          --configuration Release
          --runtime linux-arm64
          --self-contained true
          /p:Version=${{ steps.version.outputs.version }}
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true
          /p:PublishTrimmed=false
          --output publish/linux-arm64

      - name: Create ZIP packages
        shell: bash
        run: |
          set -euo pipefail
          rm -f "${{ steps.version.outputs.win_zip_name }}" "${{ steps.version.outputs.linux_zip_name }}"
          (cd publish/win-x64 && zip -r "$GITHUB_WORKSPACE/${{ steps.version.outputs.win_zip_name }}" .)
          chmod +x publish/linux-arm64/TencentCloudDdnsCSharp publish/linux-arm64/*.sh
          (cd publish/linux-arm64 && zip -r "$GITHUB_WORKSPACE/${{ steps.version.outputs.linux_zip_name }}" .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.version.outputs.win_zip_name }}
            ${{ steps.version.outputs.linux_zip_name }}
