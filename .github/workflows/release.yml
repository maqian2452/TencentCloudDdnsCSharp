name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "github.ref_name is empty."
          }
          $version = $tag.TrimStart('v')
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip_name=TencentCloudDdnsCSharp-$tag-win-x64.zip" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore TencentCloudDdnsCSharp.sln

      - name: Build
        run: dotnet build TencentCloudDdnsCSharp.sln --configuration Release --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test TencentCloudDdnsCSharp.sln --configuration Release --no-build

      - name: Publish
        run: >
          dotnet publish TencentCloudDdnsCSharp/TencentCloudDdnsCSharp.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          /p:Version=${{ steps.version.outputs.version }}
          /p:PublishSingleFile=false
          /p:PublishTrimmed=false
          --output publish/win-x64

      - name: Create ZIP package
        shell: pwsh
        run: |
          $zipPath = Join-Path (Get-Location) "${{ steps.version.outputs.zip_name }}"
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path publish/win-x64/* -DestinationPath $zipPath

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.version.outputs.zip_name }}
